<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <!-- Professional pyramid diagram for market research -->
  <!-- 4 levels: Your Company → Competitors → Customers → Market & Segment -->

  <defs>
    <!-- Professional color scheme (no AI slop) -->
    <style>
      .level-1 { fill: #6A9BCC; stroke: #4A7BA7; stroke-width: 2; }
      .level-2 { fill: #8AADD8; stroke: #6A9BCC; stroke-width: 2; }
      .level-3 { fill: #AAC4E4; stroke: #8AADD8; stroke-width: 2; }
      .level-4 { fill: #CADCF0; stroke: #AAC4E4; stroke-width: 2; }
      .text-title { fill: #141413; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 600; text-anchor: middle; }
      .text-subtitle { fill: #2C2C2C; font-family: Arial, Helvetica, sans-serif; font-size: 12px; text-anchor: middle; }
      .text-label { fill: #FFFFFF; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 600; text-anchor: middle; }
      .arrow { fill: none; stroke: #D97757; stroke-width: 3; marker-end: url(#arrowhead); }
    </style>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D97757" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" class="text-title">Market Research Pyramid Model</text>
  <text x="300" y="50" class="text-subtitle">Foundation to Strategy: Bottom-Up Analysis</text>

  <!-- Level 4 (Bottom): Market & Segment - Widest base -->
  <polygon points="100,450 500,450 450,350 150,350" class="level-4"/>
  <text x="300" y="390" class="text-label">LEVEL 4</text>
  <text x="300" y="410" class="text-label">Market & Segment Analysis</text>
  <text x="300" y="430" class="text-subtitle">Size, Growth, Trends, Opportunities</text>

  <!-- Level 3: Customer Insights -->
  <polygon points="150,350 450,350 400,250 200,250" class="level-3"/>
  <text x="300" y="290" class="text-label">LEVEL 3</text>
  <text x="300" y="310" class="text-label">Customer Insights</text>
  <text x="300" y="330" class="text-subtitle">Needs, Motivations, Barriers, Decisions</text>

  <!-- Level 2: Competitive Landscape -->
  <polygon points="200,250 400,250 350,150 250,150" class="level-2"/>
  <text x="300" y="190" class="text-label">LEVEL 2</text>
  <text x="300" y="210" class="text-label">Competitive Landscape</text>
  <text x="300" y="230" class="text-subtitle">Positioning, Differentiation, Gaps</text>

  <!-- Level 1 (Top): Your Company - Narrowest peak -->
  <polygon points="250,150 350,150 300,80 300,80" class="level-1"/>
  <text x="300" y="110" class="text-label">LEVEL 1</text>
  <text x="300" y="130" class="text-label">Your Company</text>

  <!-- Arrows showing flow from bottom to top -->
  <path d="M 300 440 L 300 420" class="arrow"/>
  <path d="M 300 340 L 300 320" class="arrow"/>
  <path d="M 300 240 L 300 220" class="arrow"/>
  <path d="M 300 140 L 300 100" class="arrow"/>

  <!-- Side annotations -->
  <g>
    <!-- Left side: Data characteristics -->
    <text x="50" y="420" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic;">Broad data</text>
    <text x="50" y="290" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic;">Behavioral</text>
    <text x="50" y="190" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic;">Competitive</text>
    <text x="50" y="115" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic;">Strategic</text>

    <!-- Right side: Analysis type -->
    <text x="520" y="420" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic; text-anchor: start;">Quantitative</text>
    <text x="520" y="290" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic; text-anchor: start;">Qualitative</text>
    <text x="520" y="190" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic; text-anchor: start;">Benchmarking</text>
    <text x="520" y="115" style="fill: #5A5A5A; font-family: Arial; font-size: 11px; font-style: italic; text-anchor: start;">Synthesis</text>
  </g>

  <!-- Footer note -->
  <text x="300" y="485" class="text-subtitle">Build from market foundation (Level 4) to strategic positioning (Level 1)</text>
</svg>
